	<script>
	function numAdd()
	{
	var n1=parseInt(document.getElementById("no1").value);
	var n2=parseInt(document.getElementById("no2").value);
	var res=n1+n2;
	document.getElementById("res").value=res;
	}
	function numSub()
	{
	var n1=parseInt(document.getElementById("no1").value);
	var n2=parseInt(document.getElementById("no2").value);
	var res=n1-n2;
	document.getElementById("res").value=res;
	}
	function numMul()
	{
	var n1=parseInt(document.getElementById("no1").value);
	var n2=parseInt(document.getElementById("no2").value);
	var res=n1*n2;
	document.getElementById("res").value=res;
	}
	function numDiv()
	{
	var n1=parseInt(document.getElementById("no1").value);
	var n2=parseInt(document.getElementById("no2").value);
	var res=n1/n2;
	document.getElementById("res").value=res;
	}
	</script>
